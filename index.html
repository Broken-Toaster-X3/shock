<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: white;
    }
    h1 { margin-bottom: 40px; }
    button {
      padding: 20px 40px;
      font-size: 1.2rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }
    button:hover { background: #c73652; }
    button:active { transform: scale(0.96); }
    #status {
      margin-top: 20px;
      font-size: 0.9rem;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <h1>Bracelet</h1>
  <button onclick="sendShock()">Send Shock</button>
  <p id="status"></p>

  <script>
    const TOPIC = "toasterssupersecretawesomeshockcollar2"; // change this to something unique

    async function sendShock() {
      document.getElementById("status").textContent = "Sending...";
      try {
        const res = await fetch(`https://ntfy.sh/${TOPIC}`, {
          method: "POST",
          body: "shock"
        });
        if (res.ok) {
          document.getElementById("status").textContent = "✓ Sent!";
        } else {
          document.getElementById("status").textContent = "✗ Failed";
        }
      } catch (e) {
        document.getElementById("status").textContent = "✗ Network error";
      }
    }
  </script>
</body>
</html>
